<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de autos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="container">
    
    <main>
        <h1 class="my-4">Agencia de autos</h1>
        <form class="form-inline">
            <div class="form-group mb-2">
                <label class="sr-only">Marca</label>
                <select id="filtrarPorMarca">
                    <option value="Fiat">Fiat</option>
                    <option value="Chevrolet">Chevrolet</option>
                    <option value="Renault">Renault</option>
                    <option value="Citroen">Citroen</option>
                </select>
                <button id="btn-filtrar" type="button" class="btn btn-primary mb-2">Filtrar</button>
            </div>

        </form>

        <table class="table table-striped table-hover">
            <thead>
                <tr>
                    <th scope="col">Marca</th>
                    <th scope="col">Modelo</th>
                    <th scope="col">Año</th>
                    <th scope="col">Precio</th>
                </tr>
            </thead>

            <tbody id="tablaAutosBody">
                <!-- Las filas de autos se insertarán aquí con JavaScript -->
            </tbody>
        </table>
        <a class="btn btn-primary" href="nuevo.html"><i class="bi bi-plus"></i> Nuevo</a>

    </main>


    <script src="js/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY31HB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
