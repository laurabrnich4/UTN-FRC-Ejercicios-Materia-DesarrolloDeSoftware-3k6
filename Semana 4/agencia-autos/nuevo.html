<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar auto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
</head>

<body >
    <main class="container">
        <h2 class="my-4">Registrar auto</h2>
        <form id="formularioAgregarAuto" class="mb-5" style="width: 50%;">
            <div class="row">
                <label for="inputMarca" class="form-label">Marca</label>
                <input type="text" class="form-control" id="inputMarca" required>
            </div>

            <div class="row">
                <label for="inputModelo" class="form-label">Modelo</label>
                <input type="text" class="form-control" id="inputModelo" required>
            </div>

            <div class="row">
                <label for="inputAnio" class="form-label">Año</label>
                <input type="number" class="form-control" id="inputAnio" min="1900" max="2025" required>
            </div>

            <div class="row">
                <label for="inputPrecio" class="form-label">Precio</label>
                <input type="number" class="form-control" id="inputPrecio" min="0" step="1000" required>
            </div>
            <div class="col mt-3">
                <button type="button" id="btn-aceptar" class="btn btn-primary">Aceptar</button>
                <a class="btn btn-secondary" href="index.html"><i class="bi bi-minus"></i> Cancelar</a>
            </div>
           
        </form>
        
    </main>


    <script src="js/nuevo.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY31HB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
