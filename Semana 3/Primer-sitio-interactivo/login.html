<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sitio Interactivo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
  <header>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#"><img src="./images/logo.jpg" width="30" height="30"
            class="d-inline-block align-text-top" alt=""></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="index.html">Inicio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#contacto">Contacto</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="login.html">Login</a>
            </li>
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                aria-expanded="false">
                Servicios
              </a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">Servicio 1</a></li>
                <li><a class="dropdown-item" href="#">Servicio 2</a></li>
                <li>
                  <hr class="dropdown-divider">
                </li>
                <li><a class="dropdown-item" href="#">Otro servicio</a></li>
              </ul>
            </li>
            <!-- <li class="nav-item">
              <a class="nav-link disabled" aria-disabled="true">Disabled</a>
            </li> -->
          </ul>
          <form class="d-flex" role="search">
            <input class="form-control me-2" type="search" placeholder="Buscar" aria-label="Search" />
            <button class="btn btn-success" type="submit">Search</button>
          </form>
        </div>
      </div>
    </nav>
  </header>
  <main>

    <section class="container d-flex justify-content-center align-items-center vh-100">
      <div class="card shadow-sm" style="width: 100%; max-width: 400px; justify-content: center; align-items: center;">
        <div class="card-body">
          <h2 class="card-title text-center mb-4">Iniciar Sesión</h2>

          <form onsubmit="procesarLogin(event)">
            <div class="m-3 row align-items-center flex-nowrap">
              <label for="email" class="col-sm-4 col-form-label">Email</label>
              <div class="col-sm-9">
                <input type="email" class="form-control" id="email" placeholder="email@example.com" required>
              </div>
            </div>

            <div class="m-3 row align-items-center flex-nowrap">
              <label for="password" class="col-sm-4 col-form-label">Password</label>
              <div class="col-sm-9">
                <input type="password" class="form-control" id="password" required>
              </div>
            </div>

            <div class="mt-4 text-center">
              <button type="submit" class="btn btn-danger w-100">Enviar</button>
            </div>
          </form>

        </div>
      </div>
    </section>

    <section id="contacto" class="contacto">
      <h2>Contáctenos</h2>
      <p>
        📞 Tel: (123) 456-7890
        ✉️ Email: first.last@example.com
      </p>
    </section>
  </main>
  <footer>
    <p> &copy; <strong>2026 Sitio Interactivo</strong> Todos los derechos reservados.</p>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="./js/login.js"></script>
</body>

</html>
